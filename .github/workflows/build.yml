name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/build

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: "*.deb"
          if-no-files-found: warn
